name: AI Developer Agent Pipeline

on:
  repository_dispatch:
    types: [ai-developer-trigger]

permissions:
  contents: write
  pull-requests: write

jobs:
  code_generation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Read Technical Spec
        id: read_spec
        run: |
          SPEC_PATH="${{ github.event.client_payload.spec_path }}"
          CARD_ID="${{ github.event.client_payload.card_id }}"
          STORY_TITLE="${{ github.event.client_payload.title }}"
          
          echo "Processando Card: $STORY_TITLE"
          echo "Arquivo de Spec: $SPEC_PATH"
          
          # A Spec estará disponível no repositório pois o backend exportou via API antes do trigger
          cat $SPEC_PATH
          
          # Aqui você integraria o seu Agente Desenvolvedor (ex: Claude Code)
          # Exemplo pseudo-código:
          # npm install -g @anthropic-ai/claude-code
          # claude-code "You are an expert developer. Read $SPEC_PATH, implement the feature, and write tests according to the spec."
          
      - name: Run AI Agent
        run: |
          echo "Simulando desenvolvimento da feature com IA..."
          # O script do agente rodaria aqui modificando o código fonte.
          
      - name: Commit Changes & Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI Developer Agent"
          git config user.email "ai-agent@users.noreply.github.com"
          
          # Cria uma nova branch
          BRANCH_NAME="feature/ai-card-${{ github.event.client_payload.card_id }}"
          git checkout -b $BRANCH_NAME
          
          # Adiciona arquivos modificados
          git add .
          
          # Se houver mudanças, faz commit e push
          if ! git diff-index --quiet HEAD; then
            git commit -m "feat: implementado automaticamente [Card: ${{ github.event.client_payload.card_id }}]"
            git push origin $BRANCH_NAME
            
            # Abre um Pull Request via GitHub CLI
            gh pr create --title "✨ Feature Automática: ${{ github.event.client_payload.title }}" --body "Este Pull Request foi gerado e implementado automaticamente pelo Agente Desenvolvedor baseado na Especificação do Agente Tech Lead." --head $BRANCH_NAME --base main
          else
            echo "Nenhuma mudança gerada pela IA."
          fi
